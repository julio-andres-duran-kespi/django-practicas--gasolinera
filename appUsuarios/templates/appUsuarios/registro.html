{% extends "appUsuarios/base.html" %}

{% block title %}Registro Usuarios{% endblock %}

{% block content %}

<p>Formulario de registro</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Registrarse</button>
</form>
 
<p>¿Ya tienes cuenta? <a href="{% url 'appUsuarios:login' %}">Login</a></p>
<p>Ir a la página principal: <a href="{% url 'appMain:home' %}">Inicio</a></p>

{% endblock %}
