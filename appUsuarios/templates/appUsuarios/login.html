{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
{% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
{% endif %}
<p>Formulario  del login</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Iniciar Sesión</button>
</form>
{% endblock %}
